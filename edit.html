
<!DOCTYPE html><html><head>
<link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'>
</head><body class='container py-4'>
<h2>Edit Patient</h2>
<form method='post'>
<input class='form-control mb-2' name='full_name' value='{{p.full_name}}'>
<input class='form-control mb-2' name='email' value='{{p.email}}'>
<input class='form-control mb-2' name='dob' value='{{p.dob}}'>
<input class='form-control mb-2' name='glucose' value='{{p.glucose}}'>
<input class='form-control mb-2' name='haemoglobin' value='{{p.haemoglobin}}'>
<input class='form-control mb-2' name='cholesterol' value='{{p.cholesterol}}'>
<button class='btn btn-success'>Update</button>
</form></body></html>
