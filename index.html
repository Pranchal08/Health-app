
<!DOCTYPE html><html><head>
<link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'>
<title>Health Prediction Dashboard</title></head>
<body class='container py-4'>
<h2>Health Prediction Dashboard</h2>
<form method='get'><input class='form-control mb-3' name='q' placeholder='Search patient'></form>
<form action='/add' method='post'>
<input class='form-control mb-2' name='full_name' placeholder='Full Name' required>
<input class='form-control mb-2' type='email' name='email' placeholder='Email' required>
<input class='form-control mb-2' type='date' name='dob' required>
<input class='form-control mb-2' type='number' step='0.01' name='glucose' placeholder='Glucose' required>
<input class='form-control mb-2' type='number' step='0.01' name='haemoglobin' placeholder='Haemoglobin' required>
<input class='form-control mb-2' type='number' step='0.01' name='cholesterol' placeholder='Cholesterol' required>
<button class='btn btn-primary'>Add Patient</button>
</form><hr>
<table class='table table-bordered'>
<tr><th>Name</th><th>Email</th><th>Remarks</th><th>Actions</th></tr>
{% for p in patients %}
<tr>
<td>{{p.full_name}}</td><td>{{p.email}}</td><td>{{p.remarks}}</td>
<td>
<a class='btn btn-warning btn-sm' href='/edit/{{p.id}}'>Edit</a>
<a class='btn btn-danger btn-sm' href='/delete/{{p.id}}'>Delete</a>
</td>
</tr>
{% endfor %}
</table>
</body></html>
